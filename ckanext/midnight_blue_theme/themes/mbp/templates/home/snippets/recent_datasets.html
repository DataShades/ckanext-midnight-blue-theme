{% set packages = h.get_recent_datasets(count=6) %}
{{ ui.heading(_("Recent Datasets"), level=2) }}

<div>
    <ul class="recent-packages">
        {% for package in packages %}
            {{ ui.package(package=package) }}
        {% endfor %}
    </ul>
</div>

<div>
    {{ ui.button(_('View all datasets'), style="primary-outline", href=h.url_for('dataset.search')) }}
</div>
